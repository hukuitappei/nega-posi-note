<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Log</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#818cf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Log">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --pos: #4ade80;
    --pos-dim: #1a3a25;
    --neg: #f87171;
    --neg-dim: #3a1a1a;
    --accent: #818cf8;
    --accent-dim: #1e1e3a;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --score: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    padding: 20px 20px 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .app-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
  }
  .date-display {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .streak-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--score);
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* Nav */
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: color 0.2s;
  }
  .nav-btn span {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }
  .nav-btn.active { color: var(--accent); }

  /* Screens */
  .screen { display: none; padding: 16px 20px; }
  .screen.active { display: block; }

  /* ===== TODAY SCREEN ===== */
  .score-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .score-label {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .score-value {
    font-size: 32px;
    font-weight: 900;
    color: var(--score);
    font-family: 'DM Mono', monospace;
    line-height: 1;
    margin-bottom: 8px;
  }
  .score-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }
  .score-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--score);
    cursor: pointer;
  }

  .section-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .entry-block {
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .entry-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .entry-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pos-dot { background: var(--pos); box-shadow: 0 0 8px var(--pos); }
  .neg-dot { background: var(--neg); box-shadow: 0 0 8px var(--neg); }
  .entry-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .pos-label { color: var(--pos); }
  .neg-label { color: var(--neg); }
  .entry-items {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .entry-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .entry-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    transition: border-color 0.2s;
  }
  .entry-input:focus { border-color: var(--accent); }
  .entry-input::placeholder { color: var(--text-muted); }
  .remove-btn {
    width: 28px;
    height: 28px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 8px;
  }
  .add-btn {
    width: 100%;
    padding: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    border-top: 1px solid var(--border);
    transition: color 0.2s;
  }
  .add-btn:hover { color: var(--text); }

  /* AI評価ボタン */
  .ai-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    margin: 12px 0;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .ai-btn:hover { background: rgba(129,140,248,0.15); }
  .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* AI結果 */
  .ai-result {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  .ai-result.show { display: block; }
  .ai-score-row {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }
  .ai-score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .ai-score-num {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
  }
  .ai-score-lbl {
    font-size: 9px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }
  .ai-comment {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.8; }
  .save-success {
    text-align: center;
    color: var(--pos);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-success.show { opacity: 1; }

  /* ===== HISTORY SCREEN ===== */
  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-scores {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
  }
  .history-score {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .history-preview {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .pos-tag { color: var(--pos); }
  .neg-tag { color: var(--neg); }
  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 40px 0;
    font-family: 'DM Mono', monospace;
  }

  /* ===== REVIEW SCREEN ===== */
  .period-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .period-btn {
    flex: 1;
    padding: 8px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .period-btn.active {
    background: var(--accent);
    color: white;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .chart-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .mini-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 60px;
  }
  .bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: height 0.3s;
  }
  .bar-lbl {
    font-size: 8px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
  .top-items-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .top-item {
    font-size: 13px;
    color: var(--text-dim);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .top-item:last-child { border-bottom: none; }
  .top-item-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(129,140,248,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Detail modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 430px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
  }
  .modal-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .modal-entry-list { list-style: none; }
  .modal-entry-list li {
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .modal-entry-list li:last-child { border-bottom: none; }
  .modal-ai-comment {
    background: var(--accent-dim);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    border: 1px solid rgba(129,140,248,0.2);
  }
</style>
</head>
<body>

<!-- インストールバナー -->
<div id="installBanner" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;background:#1e1e2a;border:1px solid #818cf8;border-radius:12px;padding:12px 16px;z-index:500;align-items:center;gap:10px;">
  <span style="font-size:20px">📲</span>
  <div style="flex:1">
    <div style="font-size:12px;font-weight:700;color:#e2e8f0">ホーム画面に追加</div>
    <div style="font-size:11px;color:#64748b;font-family:'DM Mono',monospace">アプリとして使えます</div>
  </div>
  <button id="installBtn" style="background:#818cf8;border:none;border-radius:8px;color:white;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:700">追加</button>
  <button id="installDismiss" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;padding:4px">✕</button>
</div>

<div class="header">
  <div class="header-top">
    <div class="app-title">DAILY LOG</div>
    <div class="streak-badge" id="streakBadge">🔥 0日連続</div>
  </div>
  <div class="date-display" id="todayLabel"></div>
</div>

<!-- TODAY SCREEN -->
<div class="screen active" id="screen-today">
  <div class="score-row">
    <div class="score-card">
      <div class="score-label">WAKU度</div>
      <div class="score-value" id="wakuVal">5</div>
      <input type="range" class="score-slider" min="1" max="10" value="5" id="wakuSlider"
        oninput="document.getElementById('wakuVal').textContent=this.value">
    </div>
    <div class="score-card">
      <div class="score-label">やり切り感</div>
      <div class="score-value" id="yariVal">5</div>
      <input type="range" class="score-slider" min="1" max="10" value="5" id="yariSlider"
        oninput="document.getElementById('yariVal').textContent=this.value">
    </div>
  </div>

  <div class="section-title">TODAY'S ENTRIES</div>

  <div class="entry-block">
    <div class="entry-header">
      <div class="entry-dot pos-dot"></div>
      <div class="entry-label pos-label">POSITIVE</div>
    </div>
    <div class="entry-items" id="posItems"></div>
    <button class="add-btn" onclick="addItem('pos')">＋ 追加</button>
  </div>

  <div class="entry-block">
    <div class="entry-header">
      <div class="entry-dot neg-dot"></div>
      <div class="entry-label neg-label">NEGATIVE</div>
    </div>
    <div class="entry-items" id="negItems"></div>
    <button class="add-btn" onclick="addItem('neg')">＋ 追加</button>
  </div>

  <button class="ai-btn" id="aiBtn" onclick="runAI()">
    <span>✦</span> AI評価を受ける
  </button>

  <div class="ai-result" id="aiResult">
    <div class="section-title" style="margin-bottom:10px">AI ANALYSIS</div>
    <div class="ai-score-row">
      <div class="ai-score-item">
        <div class="ai-score-num" id="aiPosScore" style="color:var(--pos)">—</div>
        <div class="ai-score-lbl">ポジ強度</div>
      </div>
      <div class="ai-score-item">
        <div class="ai-score-num" id="aiNegScore" style="color:var(--neg)">—</div>
        <div class="ai-score-lbl">ネガ強度</div>
      </div>
      <div class="ai-score-item">
        <div class="ai-score-num" id="aiBalScore" style="color:var(--accent)">—</div>
        <div class="ai-score-lbl">バランス</div>
      </div>
    </div>
    <div class="ai-comment" id="aiComment"></div>
  </div>

  <button class="save-btn" onclick="saveToday()">保存する</button>
  <div class="save-success" id="saveSuccess">✓ 保存しました</div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('week', this)">今週</button>
    <button class="filter-btn" onclick="setFilter('month', this)">今月</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- REVIEW SCREEN -->
<div class="screen" id="screen-review">
  <div class="period-toggle">
    <button class="period-btn active" onclick="setPeriod('week', this)">週次</button>
    <button class="period-btn" onclick="setPeriod('month', this)">月次</button>
  </div>
  <div id="reviewContent"></div>
</div>

<!-- Bottom Nav -->
<div class="nav">
  <button class="nav-btn active" onclick="showScreen('today', this)">
    <span style="font-size:20px">📝</span>
    <span>TODAY</span>
  </button>
  <button class="nav-btn" onclick="showScreen('history', this)">
    <span style="font-size:20px">📖</span>
    <span>LOG</span>
  </button>
  <button class="nav-btn" onclick="showScreen('review', this)">
    <span style="font-size:20px">📊</span>
    <span>REVIEW</span>
  </button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ===== Storage =====
const STORAGE_KEY = 'daily_log_v1';

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch(e) { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ===== Init =====
const weekdays = ['日','月','火','水','木','金','土'];

function getToday() {
  const now = new Date();
  // ローカル時間でYYYY-MM-DDを生成
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return { date: now, key: `${y}-${m}-${d}` };
}

const { date: today, key: todayKey } = getToday();

document.getElementById('todayLabel').textContent =
  `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${weekdays[today.getDay()]}）`;

// Load today's draft
const data = loadData();
if (data[todayKey]) {
  const d = data[todayKey];
  document.getElementById('wakuSlider').value = d.waku || 5;
  document.getElementById('wakuVal').textContent = d.waku || 5;
  document.getElementById('yariSlider').value = d.yari || 5;
  document.getElementById('yariVal').textContent = d.yari || 5;
  (d.pos || ['']).forEach((t,i) => { if(i>0||t) addItem('pos', t); else addItem('pos'); });
  (d.neg || ['']).forEach((t,i) => { if(i>0||t) addItem('neg', t); else addItem('neg'); });
} else {
  addItem('pos'); addItem('neg');
}

updateStreak();

// ===== Item management =====
function addItem(type, value='') {
  const container = document.getElementById(type+'Items');
  const div = document.createElement('div');
  div.className = 'entry-item';
  div.innerHTML = `
    <textarea class="entry-input" placeholder="${type==='pos' ? '良かったこと、嬉しかったこと...' : '辛かったこと、モヤったこと...'}" rows="1"
      oninput="autoResize(this)">${value}</textarea>
    <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  container.appendChild(div);
  const ta = div.querySelector('textarea');
  autoResize(ta);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function getItems(type) {
  return Array.from(document.querySelectorAll(`#${type}Items textarea`))
    .map(t => t.value.trim()).filter(t => t);
}

// ===== Save =====
function saveToday() {
  const d = loadData();
  d[todayKey] = {
    waku: parseInt(document.getElementById('wakuSlider').value),
    yari: parseInt(document.getElementById('yariSlider').value),
    pos: getItems('pos'),
    neg: getItems('neg'),
    aiComment: document.getElementById('aiComment').textContent || '',
    aiPos: document.getElementById('aiPosScore').textContent,
    aiNeg: document.getElementById('aiNegScore').textContent,
    aiBal: document.getElementById('aiBalScore').textContent,
    savedAt: new Date().toISOString()
  };
  saveData(d);
  updateStreak();
  const el = document.getElementById('saveSuccess');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== Streak =====
function updateStreak() {
  const d = loadData();
  let streak = 0;
  const dt = new Date();
  while(true) {
    const k = dt.toISOString().split('T')[0];
    if(d[k]) { streak++; dt.setDate(dt.getDate()-1); }
    else break;
    if(streak > 365) break;
  }
  document.getElementById('streakBadge').textContent = `🔥 ${streak}日連続`;
}

// ===== AI Analysis =====
async function runAI() {
  const pos = getItems('pos');
  const neg = getItems('neg');
  if(pos.length === 0 && neg.length === 0) {
    alert('ポジ・ネガを少なくとも1つ入力してください');
    return;
  }
  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 分析中...';

  const prompt = `あなたはメンタルコーチです。以下の日記エントリーを分析して、JSON形式で回答してください。

ポジティブ: ${pos.length ? pos.map((p,i)=>`${i+1}. ${p}`).join('\n') : 'なし'}
ネガティブ: ${neg.length ? neg.map((n,i)=>`${i+1}. ${n}`).join('\n') : 'なし'}

以下のJSON形式のみで返答（余分なテキスト不要）:
{
  "posScore": 1-10の数値（ポジの強さ・深さ）,
  "negScore": 1-10の数値（ネガの深刻さ）,
  "balance": 1-10の数値（10=非常にポジティブ、1=非常にネガティブ）,
  "comment": "100-150字の日本語コメント。客観的に今日の状態を評価し、明日へのワンアドバイスを含める"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('aiPosScore').textContent = parsed.posScore;
    document.getElementById('aiNegScore').textContent = parsed.negScore;
    document.getElementById('aiBalScore').textContent = parsed.balance;
    document.getElementById('aiComment').textContent = parsed.comment;
    document.getElementById('aiResult').classList.add('show');
  } catch(e) {
    document.getElementById('aiComment').textContent = '分析できませんでした。もう一度試してください。';
    document.getElementById('aiResult').classList.add('show');
  }

  btn.disabled = false;
  btn.innerHTML = '<span>✦</span> AI評価を再実行';
}

// ===== Navigation =====
function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
  if(name === 'history') renderHistory('all');
  if(name === 'review') renderReview('week');
}

// ===== History =====
let currentFilter = 'all';
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory(f);
}

function renderHistory(filter) {
  const d = loadData();
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  const now = new Date();

  const keys = Object.keys(d).sort().reverse();
  const filtered = keys.filter(k => {
    if(filter === 'all') return true;
    const [ky, km, kd] = k.split('-').map(Number);
    const dt = new Date(ky, km-1, kd);
    if(filter === 'week') {
      const nowLocal = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diff = (nowLocal - dt) / 86400000;
      return diff < 7;
    }
    if(filter === 'month') {
      return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear();
    }
  });

  if(filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">記録がまだありません</div>';
    return;
  }

  filtered.forEach(k => {
    const entry = d[k];
    const [ky, km, kd] = k.split('-').map(Number);
    const dt = new Date(ky, km-1, kd);
    const label = `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${weekdays[dt.getDay()]}）`;
    const div = document.createElement('div');
    div.className = 'history-item';
    div.onclick = () => showModal(k, entry);
    div.innerHTML = `
      <div class="history-date">
        <span>${label}</span>
        ${entry.aiBal && entry.aiBal !== '—' ? `<span style="font-size:10px;color:var(--accent)">AI:${entry.aiBal}/10</span>` : ''}
      </div>
      <div class="history-scores">
        <span class="history-score" style="color:var(--score)">⚡ ${entry.waku || '—'}</span>
        <span class="history-score" style="color:var(--accent)">✓ ${entry.yari || '—'}</span>
      </div>
      <div class="history-preview">
        ${entry.pos && entry.pos[0] ? `<span class="pos-tag">＋</span> ${entry.pos[0]}<br>` : ''}
        ${entry.neg && entry.neg[0] ? `<span class="neg-tag">－</span> ${entry.neg[0]}` : ''}
      </div>
    `;
    list.appendChild(div);
  });
}

// ===== Modal =====
function showModal(k, entry) {
  const [ky, km, kd] = k.split('-').map(Number);
  const dt = new Date(ky, km-1, kd);
  const label = `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${weekdays[dt.getDay()]}）`;
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-date">${label}</div>
    <div style="display:flex;gap:20px;margin-bottom:16px">
      <div><div style="font-family:'DM Mono',monospace;font-size:24px;color:var(--score)">${entry.waku || '—'}</div><div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace">WAKU度</div></div>
      <div><div style="font-family:'DM Mono',monospace;font-size:24px;color:var(--accent)">${entry.yari || '—'}</div><div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace">やり切り感</div></div>
      ${entry.aiBal && entry.aiBal !== '—' ? `<div><div style="font-family:'DM Mono',monospace;font-size:24px;color:var(--pos)">${entry.aiBal}</div><div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace">AIバランス</div></div>` : ''}
    </div>
    <div class="modal-section">
      <div class="modal-section-title pos-label">＋ POSITIVE</div>
      <ul class="modal-entry-list">
        ${(entry.pos||[]).map(p=>`<li><span class="pos-tag">✦</span>${p}</li>`).join('') || '<li style="color:var(--text-muted)">記録なし</li>'}
      </ul>
    </div>
    <div class="modal-section">
      <div class="modal-section-title neg-label">－ NEGATIVE</div>
      <ul class="modal-entry-list">
        ${(entry.neg||[]).map(n=>`<li><span class="neg-tag">▼</span>${n}</li>`).join('') || '<li style="color:var(--text-muted)">記録なし</li>'}
      </ul>
    </div>
    ${entry.aiComment ? `
    <div class="modal-section">
      <div class="modal-section-title" style="color:var(--accent)">✦ AI分析</div>
      <div class="modal-ai-comment">${entry.aiComment}</div>
    </div>` : ''}
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if(e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('show');
}

// ===== Review =====
let currentPeriod = 'week';
function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(p);
}

function renderReview(period) {
  const d = loadData();
  const now = new Date();
  const container = document.getElementById('reviewContent');

  const keys = Object.keys(d).filter(k => {
    const [ky, km, kd] = k.split('-').map(Number);
    const dt = new Date(ky, km-1, kd);
    if(period === 'week') {
      const nowLocal = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diff = (nowLocal - dt) / 86400000;
      return diff < 7;
    } else {
      return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear();
    }
  }).sort();

  if(keys.length === 0) {
    container.innerHTML = '<div class="empty-state">この期間の記録がありません</div>';
    return;
  }

  const wakuAvg = (keys.reduce((s,k)=>s+(d[k].waku||0),0)/keys.length).toFixed(1);
  const yariAvg = (keys.reduce((s,k)=>s+(d[k].yari||0),0)/keys.length).toFixed(1);
  const posCount = keys.reduce((s,k)=>s+(d[k].pos||[]).length,0);
  const negCount = keys.reduce((s,k)=>s+(d[k].neg||[]).length,0);

  // Chart data
  const chartBars = keys.slice(-7).map(k => {
    const [ky, km, kd] = k.split('-').map(Number);
    return {
      label: kd+'日',
      waku: d[k].waku || 0,
      yari: d[k].yari || 0
    };
  });
  const maxVal = 10;

  // Top positives / negatives
  const allPos = keys.flatMap(k => d[k].pos || []).filter(t=>t);
  const allNeg = keys.flatMap(k => d[k].neg || []).filter(t=>t);

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" style="color:var(--score)">${wakuAvg}</div>
        <div class="stat-lbl">平均WAKU度</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--accent)">${yariAvg}</div>
        <div class="stat-lbl">平均やり切り感</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--pos)">${posCount}</div>
        <div class="stat-lbl">POSITIVEの数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--neg)">${negCount}</div>
        <div class="stat-lbl">NEGATIVEの数</div>
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-title">SCORE TREND</div>
      <div class="mini-chart">
        ${chartBars.map(b => `
          <div class="bar-wrap">
            <div class="bar" style="height:${(b.waku/maxVal)*52}px;background:var(--score);opacity:0.8"></div>
            <div class="bar-lbl">${b.label}</div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:8px;display:flex;gap:12px">
        <span style="font-size:9px;color:var(--score);font-family:'DM Mono',monospace">■ WAKU</span>
        <span style="font-size:9px;color:var(--accent);font-family:'DM Mono',monospace">■ やり切り</span>
      </div>
    </div>

    ${allPos.length > 0 ? `
    <div class="top-items-block">
      <div class="section-title pos-label" style="margin-bottom:10px">＋ POSITIVE LOG</div>
      ${allPos.slice(-5).reverse().map((t,i)=>`
        <div class="top-item">
          <span class="top-item-num">${i+1}</span>
          <span>${t}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${allNeg.length > 0 ? `
    <div class="top-items-block">
      <div class="section-title neg-label" style="margin-bottom:10px">－ NEGATIVE LOG</div>
      ${allNeg.slice(-5).reverse().map((t,i)=>`
        <div class="top-item">
          <span class="top-item-num">${i+1}</span>
          <span>${t}</span>
        </div>
      `).join('')}
    </div>` : ''}

    <div style="text-align:center;padding:8px;font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace">
      ${keys.length}日分の記録 | ${period === 'week' ? '過去7日間' : now.getMonth()+1+'月'}
    </div>
  `;
}

// ===== Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}

// ===== ホーム画面追加のプロンプト =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBanner').style.display = 'none';
  }
  deferredPrompt = null;
});

document.getElementById('installDismiss').addEventListener('click', () => {
  document.getElementById('installBanner').style.display = 'none';
});
</script>
